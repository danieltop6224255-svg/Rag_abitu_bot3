qa:
  - q: "Какой проходной балл был на ПМИ в прошлом году?"
    a: |
      В 2025 году все бюджетные места на ПМИ были заняты поступившими в приоритетном порядке (особая, целевая квоты, потупившие по олимпиаде)
  - q: "Сколько стоит обучение на «Бизнес-информатике» в Москве?"
    a: |
     850 000 ₽/год (набор 2025)
  - q: "Какие направления/специальности бакалавриата доступны на факультете компьютерных наук?"
    a: |
      Направление подготовки «Прикладная математика и информатика»:
      Прикладная математика и информатика
      Прикладной анализ данных (на английском языке)
      Компьютерные науки и анализ данных (дистанционная программа)
      Экономика и анализ данных (совместно с факультетом экономических наук ВШЭ)
      
      Направление подготовки «Программная инженерия»:
      Программная инженерия
      Дизайн и разработка информационных продуктов (совместно с Центральным университетом и Т-банком)
      Разработка игр и цифровых продуктов (совместно со Школой дизайна ВШЭ)
  - q: "Какие документы нужно подавать для поступления на бакалавриат?"
    a: |
      Документ (документы), удостоверяющий личность (паспорт РФ или иностранного гражданина)
      Документ об образовании
      Страховое свидетельство обязательного пенсионного страхования (при наличии)
      Согласие на обработку персональных данных (заполняется заранее в случае подачи документов несовершеннолетним абитуриентом)
  - q: "Каковы дедлайны подачи заявлений и документов на прием в этом году?"
    a: |
      Бюджетные места:
      с 20 июня по 25 июля 2026 года включительно – для лиц, поступающих только по результатам ЕГЭ и для лиц, поступающих без вступительных испытаний;
      с 20 июня по 15 июля 2026 года включительно – для лиц, имеющих право поступать на обучение по результатам вступительных испытаний, проводимых НИУ ВШЭ, а также лиц, поступающих на программы творческими вступительными испытаниями (за исключением поступающих без вступительных испытаний);
      с 20 июня по 15 июля 2026 года включительно – для лиц, поступающих на программы с творческими вступительными испытаниями (за исключением поступающих без вступительных испытаний).
      Места по договорам об образовании:
      с 20 июня по 12 августа 2026 года включительно – для лиц, поступающих только по результатам ЕГЭ и для лиц, поступающих без вступительных испытаний;
      с 20 июня по 03 августа 2026 года включительно – для лиц, имеющих право поступать на обучение по результатам вступительных испытаний, проводимых НИУ ВШЭ, а также лиц, поступающих на программы с творческими вступительными испытаниями (за исключением поступающих без вступительных испытаний);
      с 20 июня по 03 августа 2026 года включительно – для лиц, поступающих на программы с творческими вступительными испытаниями (за исключением поступающих без вступительных испытаний).
  - q: "Нужны ли портфолио или творческие работы для поступления?"
    a: |
      Уточните программу; например, для «Дизайна», «Кинопроизводства» или «Актёрства» портфолио/творческие материалы обязательны
  - q: "Какие предметы нужно сдать для программы «Когнитивная нейробиология»?"
    a: |
      Биология, математика/химия и русский язык
  - q: "Есть ли у ВШЭ подготовительные курсы?"
    a: |
      Да — Факультет довузовской подготовки (ФДП) и региональные отделения проводят курсы и Летние школы
  - q: "Можно ли подавать документы полностью онлайн?"
    a: |
      Да — через Личный кабинет абитуриента и через госуслуги;
  - q: "Есть ли общежитие для первокурсников и как получить место в общежитии?"
    a: |
      Да есть. Право на гарантированное предоставление мест в собственных общежитиях университета имеют категории лиц:
      Обучающиеся, указанные в части 5 статьи 36 Федерального закона от 29.12.2012 273 «Об образовании в Российской Федерации»
      Обучающиеся на местах, оплачиваемых за счет средств субсидий из федерального бюджета или на местах, оплачиваемых за счет средств университета
      Зачисленным на обучение по полностью платным программам без вступительных испытаний на основании диплома заключительного этапа Всероссийской олимпиады школьников
  - q: "Какой проходной балл на бюджет в 2025 году на программу «Программная инженерия» в Москве?"
    a: |
      299 баллов.

  - q: "С каким баллом можно было поступить на платное обучение на «Бизнес-информатику» в НИУ ВШЭ в 2025 году?"
    a: |
      241 балл.

  - q: "Какой проходной балл был на бюджет на программу «Мировая экономика» в 2025 году?"
    a: |
      372 балла.

  - q: "Есть ли бюджетные места на программе «Прикладная математика и информатика» и какой проходной балл на платное обучение?"
    a: |
      В 2025 году бюджетных мест не было, проходной балл на платное обучение составил 260 баллов.

  - q: "Какой проходной балл на платное обучение был у программы «Журналистика» в 2025 году?"
    a: |
      200 баллов.
  - q: "Сколько стоит обучение на «Программная инженерия» в НИУ ВШЭ (набор 2025)?"
    a: |
      800 000 ₽/год (набор 2025)

  - q: "Какова стоимость одного года обучения на «Бизнес-информатике» (очная форма) в 2025 году?"
    a: |
      850 000 ₽/год (набор 2025)

  - q: "Сколько стоит год обучения на программе «Журналистика» в Москве для набора 2025?"
    a: |
      690 000 ₽/год (набор 2025)

  - q: "Какая стоимость обучения на «Дизайн» (очная форма) для набора 2025?"
    a: |
      900 000 ₽/год (набор 2025)

  - q: "Сколько стоит один учебный год на «Информатика и вычислительная техника» (очная форма) в 2025 году?"
    a: |
      540 000 ₽/год (набор 2025)
  - q: "Когда в 2026 году проходит приём на бюджетные места для лиц, поступающих только по результатам ЕГЭ?"
    a: |
      С 20 июня по 25 июля 2026 года включительно.

  - q: "Какие сроки приёма на места по договорам об образовании для лиц, поступающих только по результатам ЕГЭ, в 2026 году?"
    a: |
      С 20 июня по 12 августа 2026 года включительно.

  - q: "До какого времени нужно представить согласие на зачисление на приоритетном этапе в 2026 году?"
    a: |
      До 12:00 по московскому времени 1 августа 2026 года (день завершения представления согласия — 1 августа 2026).

  - q: "Обязателен ли медицинский осмотр при поступлении в НИУ ВШЭ?"
    a: |
      Обязательное прохождение медицинского осмотра при поступлении в НИУ ВШЭ не предусмотрено.

  - q: "Какой официальный электронный адрес Приёмной комиссии НИУ ВШЭ (г. Москва)?"
    a: |
      abitur@hse.ru

  - q: "Какие вступительные испытания и минимальные баллы требуются для поступления на бакалавриат «Программная инженерия» (очная форма) в 2026 году?"
    a: |
      математика — минимально 70 баллов;
      информатика — минимально 70 баллов;
      русский язык — минимально 60 баллов.

  - q: "Какой минимальный балл по русскому языку установлен для поступления на бакалавриат по направлению «Математика»?"
    a: |
      По русскому языку минимальный балл — 65.

  - q: "Какие минимальные баллы по предметам указаны для специалитета «Компьютерная безопасность» (10.05.01)?"
    a: |
      физика/информатика — 65;
      математика — 65;
      русский язык — 60.

  - q: "Какие вступительные испытания и какие минимальные баллы установлены для программы «Журналистика» (бакалавриат) в 2026 году?"
    a: |
      творческое испытание — минимально 60 баллов;
      литература — минимально 60 баллов;
      русский язык — минимально 60 баллов.

  - q: "Какой минимальный балл по иностранному языку для Международной программы «Международные отношения и глобальные исследования» (реализуется на английском)?"
    a: |
      Иностранный язык — минимально 75 баллов.

  - q: "Когда будет следующий приём заявок на переход с платного обучения на бесплатное?"
    a: |
      Следующий приём заявок будет осуществляться с 27 января по 02 февраля 2026 г.

  - q: "Как подать заявку на переход на бесплатное обучение (где оформить)?"
    a: |
      Заявка подаётся через модуль «Заявка на бесплатное обучение» в личном кабинете iStudy.

  - q: "Сколько вакантных мест по договорам об образовании (платных) указано на 1-м курсе бакалавриата программы «Актёр»?"
    a: |
      3 вакантных места по договорам об образовании (для 1-го курса программы «Актёр»).

  - q: "Где публикуется информация о количестве вакантных мест для приёма (перевода) по каждой образовательной программе?"
    a: |
      Информация публикуется на интернет-странице каждой образовательной программы на корпоративном сайте НИУ ВШЭ в разделе «Число студентов и вакантные места».

  - q: "Будут ли рассмотрены заявки, поданные не в установленные образовательной программой сроки?"
    a: |
      Заявки, поданные не в установленные образовательной программой сроки, рассмотрению не подлежат.
  - q: "Какой адрес, площадь и вместимость столовой на Покровском бульваре, д.11, стр.2 (НИУ ВШЭ — Москва)?"
    a: |
      Адрес: 109028, г. Москва, Покровский бульвар, д.11, стр.2.
      Площадь: 1248 м².
      Количество мест: 320.
      Приспособленность для инвалидов: да.
  - q: "Предоставляется ли диетическое питание в Лицее НИУ ВШЭ (Москва)?"
    a: |
      Диетическое питание не предоставляется.

  - q: "Кто осуществляет организацию питания (горячего питания и выпечки) в образовательной организации?"
    a: |
      Питание осуществляет Комбинат общественного питания НИУ ВШЭ (горячее питание, собственная выпечка, штучная буфетная продукция промышленного производства — напитки, снэки и пр.).

easy_qa:
  - q: "Когда заканчиваются зачисления на платные места?"
    a: |
      20 августа года приема
  - q: "Когда происходит публикация конкурсных списков?"
    a: |
      27 июля года приема
  - q: "Тот кто хочет поступить в рамках целевой квоты должен проходить конкурс, и кто его проводит если да?"
    a: |
      Да, абитуриенты поступающие на места в пределах квоты на целевое обучение должны пройти внутренний конкурс, организуемый заказчиком целевого обучения
  - q: "Можно ли на вступительном испытании проводимого вузом пользоваться калькулятором?"
    a: |
      Нет, нельзя любые гаджеты (мобильные телефоны, пейджеры, планшеты и т.д.), наушники, калькуляторы нельзя использовать на вступительных испытаниях(за исключением случаев, когда это разрешено правилами конкретного вступительного испытания)
  - q: "Меня интересуют сроки проведения приема, я поступаю только по результатам ЕГЭ на бюджетное место, когда начинается и заканчивается прием?"
    a: |
      Для лиц, поступающих только по результатам ЕГЭ и для лиц, поступающих без вступительных испытаний на бюджетные места прием проходит с 20 июня по 25 июля 2026 года
  - q: "Может ли сумма балов за индивидуальные достижения быть больше 15 или вообще какой угодно или она ограничена?"
    a: |
      Сумма баллов, начисленных поступающему за индивидуальные достижения, не может быть более 10 баллов
  
  - q: "Сколько балов я дополнительно получу за разряд КМС по плаванью?"
    a: |
      Наличие действующего спортивного разряда – кандидата в мастера спорта дает 5 баллов за индивидуальные достижения.

  - q: "Обязателен ли медицинский осмотр при поступлении в НИУ ВШЭ?"
    a: |
      Обязательное прохождение медицинского осмотра при поступлении в НИУ ВШЭ не предусмотрено.
  - q: "Какой проходной балл был на платное обучение на ПМИ в 2025 году?"
    a: |
      В 2025 году бал на платное обучение ПМИ был 260
  - q: "Что такое творческие испытания и зачем они нужны?"
    a: |
     Для поступления на некоторые образовательные программы ВШЭ необходимо пройти творческие испытания. Эти испытания направлены на оценку творческих способностей, креативности и индивидуального подхода абитуриента к выполнению заданий. Творческие испытания актуальны для программ в области дизайна, журналистики и некоторых других творческих направлений.
  
  - q: "Кто должен сдавать внутренние вступительные испытания во вшэ?"
    a: |
      Внутренние вступительные испытания могут сдавать вместо егэ иностранные граждане, лица с ограниченными возможностями здоровья и другие группы, имеющие право на особые условия поступления.

  - q: "Кто может сдавать Профессиональные вступительные испытания?"
    a: |
      Абитуриенты с высшим образованием могут сдавать только профессиональные вступительные испытания, проводимые кампусами НИУ ВШЭ.